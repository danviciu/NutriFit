<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <title>NutriFit</title>
    <script>
      // Capacitor Android may emit native events before native-bridge.js is ready.
      // Create a tiny safe shim to prevent early triggerEvent crashes.
      window.Capacitor = window.Capacitor || {};
      window.Capacitor.triggerEvent =
        window.Capacitor.triggerEvent ||
        function () {
          return undefined;
        };
      window.Capacitor.createEvent =
        window.Capacitor.createEvent ||
        function (eventName, eventData) {
          return new CustomEvent(eventName, { detail: eventData || {} });
        };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
